<!doctype html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LT4CR Risk Index Explorer</title>
    <link href="https://unpkg.com/lineupjs@4.16.0/build/LineUpJS.css" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --border: #d9dee7;
        --text: #1f2933;
        --muted: #566372;
        --accent: #276ef1;
        --radius: 6px;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      /* ── Header ── */
      header {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 10px 16px 8px;
        flex-shrink: 0;
      }

      .topline {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 8px;
      }

      h1 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        white-space: nowrap;
      }

      #status {
        color: var(--muted);
        font-size: 12px;
        flex-shrink: 0;
      }

      #status.error { color: #a12222; }

      /* ── Mode bar ── */
      #mode-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        margin-left: auto;
      }

      .mode-btn, .pillar-btn {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
        white-space: nowrap;
        color: var(--muted);
      }

      .mode-btn:hover { background: #f0f2f5; color: var(--text); }

      .mode-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .pillar-btn {
        border-left: 3px solid var(--pillar-color, var(--border));
      }

      .pillar-btn:hover {
        background: #f0f2f5;
        color: var(--text);
      }

      .pillar-btn.active {
        background: color-mix(in srgb, var(--pillar-color, #276ef1) 12%, #fff);
        border-color: var(--pillar-color, var(--border));
        color: var(--text);
      }

      /* ── App body ── */
      #app {
        display: flex;
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: auto;
        overflow-y: hidden;
      }

      #lineup {
        background: var(--panel);
        flex: 1 1 auto;
        min-width: 640px;
        overflow: hidden;
      }

      /* ── Side panel ── */
      #side-panel {
        background: var(--panel);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
        transition: width 0.18s ease, min-width 0.18s ease;
        width: 0;
      }

      #side-panel.open {
        min-width: 400px;
        overflow-y: auto;
        width: 400px;
      }

      .panel-inner {
        min-width: 400px;
        padding: 0;
      }

      .panel-top {
        background: #f7f8fa;
        border-bottom: 1px solid var(--border);
        padding: 14px 16px 12px;
        position: relative;
      }

      .panel-lang {
        display: block;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      .panel-country {
        color: var(--muted);
        font-size: 13px;
      }

      .panel-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .panel-score-row {
        align-items: baseline;
        display: flex;
        font-size: 13px;
        gap: 6px;
        justify-content: space-between;
        margin-top: 8px;
      }

      .panel-score-row strong {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
      }

      .close-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 2px 4px;
        position: absolute;
        right: 10px;
        top: 10px;
      }

      .close-btn:hover { color: var(--text); }

      /* ── Pillar sections in side panel ── */
      .pillar-section {
        border-bottom: 1px solid var(--border);
        padding: 10px 16px 12px;
      }

      .pillar-head {
        align-items: center;
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }

      .pillar-dot {
        border-radius: 50%;
        flex-shrink: 0;
        height: 10px;
        width: 10px;
      }

      .pillar-name {
        flex: 1;
        font-size: 13px;
        font-weight: 700;
      }

      .level-badge {
        border-radius: 10px;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
      }

      .level-badge.country { background: #d6eaf8; color: #1a5276; }
      .level-badge.language { background: #d5f5e3; color: #1e8449; }

      .pillar-score {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 14px;
        font-weight: 700;
        margin-left: 4px;
      }

      /* ── Sub-indicator table ── */
      .sub-table {
        border-collapse: collapse;
        font-size: 12px;
        width: 100%;
      }

      .sub-table td, .sub-table th {
        padding: 3px 4px;
        vertical-align: top;
      }

      .sub-header-row th {
        color: var(--muted);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        border-bottom: 1px solid #e8e8e8;
        padding-bottom: 4px;
      }

      .sub-label {
        color: var(--text);
        font-weight: 600;
        width: 30%;
      }

      .sub-raw {
        color: var(--muted);
        font-family: "SF Mono", "Fira Code", monospace;
        text-align: right;
        white-space: nowrap;
        width: 14%;
      }

      .sub-arrow {
        color: #bbb;
        text-align: center;
        width: 4%;
      }

      .sub-norm {
        font-family: "SF Mono", "Fira Code", monospace;
        font-weight: 600;
        text-align: right;
        white-space: nowrap;
        width: 10%;
      }

      .sub-contrib {
        color: var(--accent);
        font-family: "SF Mono", "Fira Code", monospace;
        font-weight: 700;
        text-align: right;
        white-space: nowrap;
        width: 10%;
      }

      .sub-meta {
        color: var(--muted);
        font-size: 11px;
        padding-left: 8px;
        line-height: 1.4;
      }

      .formula {
        background: #f0f0f0;
        border-radius: 3px;
        display: inline-block;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 10px;
        margin-bottom: 2px;
        padding: 1px 4px;
      }

      .source-link {
        color: var(--accent);
        display: block;
        font-size: 11px;
        text-decoration: none;
      }

      .source-link:hover { text-decoration: underline; }

      .freq {
        color: #999;
        display: block;
        font-size: 10px;
      }

      .missing { color: #999; font-style: italic; }

      /* ── Weight bar ── */
      #weight-bar {
        align-items: center;
        border-top: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin-top: 8px;
        padding-top: 8px;
      }

      .weight-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .weight-group {
        align-items: center;
        display: flex;
        gap: 5px;
      }

      .w-dot {
        border-radius: 50%;
        flex-shrink: 0;
        height: 8px;
        width: 8px;
      }

      .w-name {
        color: var(--text);
        font-size: 12px;
        white-space: nowrap;
      }

      .w-slider {
        -webkit-appearance: none;
        accent-color: var(--pillar-color, var(--accent));
        cursor: pointer;
        height: 4px;
        width: 80px;
      }

      .w-val {
        color: var(--muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        min-width: 30px;
        text-align: right;
      }

      .w-total {
        color: var(--muted);
        font-size: 11px;
        margin-left: 4px;
      }

      .w-total.ok   { color: #27ae60; }
      .w-total.warn { color: #e67e22; }

      /* ── Docs link ── */
      .docs-btn {
        background: #f0f4ff;
        border: 1px solid #c5d2ee;
        border-radius: var(--radius);
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        text-decoration: none;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .docs-btn:hover { background: #e3eaff; }

      /* ── Interaction hint ── */
      #hint-bar {
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        margin-top: 6px;
        padding-top: 5px;
      }
      #hint-bar strong { color: var(--text); font-weight: 600; }

      #btn-reset-weights {
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 8px;
      }

      #btn-reset-weights:hover { background: #f0f2f5; color: var(--text); }

      /* ── LineUp overrides ── */
      .lu-col-header,
      .lu-col-header .lu-label,
      .lu-header-cell .lu-label,
      .lu-header .lu-label {
        font-size: clamp(11px, 0.85vw, 15px) !important;
        font-weight: 600 !important;
      }


      tr.null-row td { opacity: 0.6; }

      tr.null-note td {
        color: #b7770d;
        background: #fef9e7;
        border-radius: 3px;
        font-size: 11px;
        padding: 2px 6px 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topline">
        <h1>LT4CR Risk Index Explorer</h1>
        <a href="./docs/" class="docs-btn" target="_blank">About the index ↗</a>
        <span id="status">Loading…</span>
        <div id="mode-bar">
          <button id="btn-overview" class="mode-btn active">Overview mode</button>
        </div>
      </div>
      <div id="weight-bar">
        <span class="weight-label">Weights</span>
        <!-- slider groups injected by JS -->
        <span id="w-total" class="w-total"></span>
        <button id="btn-reset-weights">Reset</button>
      </div>
      <div id="hint-bar">
        <strong>Click a region row</strong> to expand / collapse its languages &nbsp;·&nbsp;
        <strong>Click any column header</strong> to re-sort the ranking
      </div>
    </header>

    <div id="app">
      <main id="lineup"></main>
      <aside id="side-panel" aria-label="Language detail">
        <div id="panel-inner" class="panel-inner"></div>
      </aside>
    </div>

    <script src="https://unpkg.com/lineupjs@4.16.0/build/LineUpJS.js"></script>
    <script>
      // ── Column config ────────────────────────────────────────────────────────

      const CONTEXT_COLS = ["language_name", "location_name"];
      const WEIGHTED_COL = "weighted_index";

      const PILLARS = [
        {
          key: "linguistic",
          label: "Linguistic",
          fullLabel: "Linguistic Indicators",
          normCol: "Linguistic_Indicators_norm",
          level: "language",
          color: "#3498db",
          defaultWeight: 20,
          subCols: [
            {
              col: "total_speakers_norm",
              label: "Total speakers",
              rawCol: "total_speakers",
              formula: "(x−min)/(max−min)",
              source: "IPUMS International / UNFPA LUDP",
              url: "https://international.ipums.org",
              freq: "census cycles (~10 yrs)",
            },
            {
              col: "Linguistic_Diversity_Index_2017_norm",
              label: "Linguistic Diversity Index",
              rawCol: "Linguistic_Diversity_Index_2017",
              formula: "direct (UNESCO 0–1 scale)",
              source: "UNESCO 2017",
              url: "https://en.wikipedia.org/wiki/List_of_countries_by_linguistic_diversity_index",
              freq: "~every 5 years",
            },
          ],
        },
        {
          key: "crisis",
          label: "Crisis Risk",
          fullLabel: "Crisis Risk Indicators",
          normCol: "Crisis_Risk_Indicators_norm",
          level: "country",
          color: "#e74c3c",
          defaultWeight: 25,
          subCols: [
            {
              col: "INFORM Severity Index_norm",
              label: "INFORM Severity",
              rawCol: "INFORM Severity Index",
              formula: "(x−min)/(max−min)",
              source: "INFORM / ReliefWeb",
              url: "https://www.inform-index.org",
              freq: "monthly",
            },
            {
              col: "Active_Risks_Count_norm",
              label: "Active risks count",
              rawCol: "Active_Risks_Count",
              formula: "(x−min)/(max−min)",
              source: "ACAPS Risk List",
              url: "https://www.acaps.org/en/thematics/risk-list",
              freq: "weekly",
            },
            {
              col: "drivers_count_norm",
              label: "Crisis driver types",
              rawCol: "drivers_count",
              formula: "count → (x−min)/(max−min)",
              source: "ACAPS Risk List",
              url: "https://www.acaps.org/en/thematics/risk-list",
              freq: "weekly",
            },
          ],
        },
        {
          key: "comms",
          label: "Comms & Tech",
          fullLabel: "Communications & Technology",
          normCol: "Communications_and_Technology_Indicators_norm",
          level: "country",
          color: "#9b59b6",
          defaultWeight: 15,
          subCols: [
            {
              col: "MCI_Index_inv_norm",
              label: "Meaningful Connectivity",
              rawCol: "MCI_Index",
              formula: "1 − (x / 100)",
              source: "GSMA / A4AI",
              url: "https://www.mobileconnectivityindex.com",
              freq: "annual",
            },
            {
              col: "Digital_Language_Support_inv_norm",
              label: "Digital Language Support",
              rawCol: "Digital_Language_Support",
              formula: "1 − (x / 100)",
              source: "GSMA / A4AI",
              url: "https://www.mobileconnectivityindex.com",
              freq: "annual",
            },
            {
              col: "Language_accessibility_of_top_ranked_apps_inv_norm",
              label: "App language accessibility",
              rawCol: "Language_accessibility_of_top_ranked_apps",
              formula: "1 − (x / 100)",
              source: "GSMA / A4AI",
              url: "https://www.mobileconnectivityindex.com",
              freq: "annual",
            },
            {
              col: "ICT_Development_Index_inv_norm",
              label: "ICT Development Index",
              rawCol: "ICT_Development_Index",
              formula: "1 − (x / 100)",
              source: "ITU",
              url: "https://www.itu.int/en/ITU-D/Statistics/Pages/IDI/default.aspx",
              freq: "annual",
            },
          ],
        },
        {
          key: "langtech",
          label: "Language Tech",
          fullLabel: "Language Technology",
          normCol: "Language_Technology_Indicators_norm",
          level: "language",
          color: "#1abc9c",
          defaultWeight: 25,
          subCols: [
            {
              col: "Recorded Hours_inv_norm",
              label: "Recorded hours",
              rawCol: "Recorded Hours",
              formula: "1 − (x−min)/(max−min)",
              source: "Mozilla Common Voice",
              url: "https://commonvoice.mozilla.org/en/languages",
              freq: "snapshot",
            },
            {
              col: "Validated Hours_inv_norm",
              label: "Validated hours",
              rawCol: "Validated Hours",
              formula: "1 − (x−min)/(max−min)",
              source: "Mozilla Common Voice",
              url: "https://commonvoice.mozilla.org/en/languages",
              freq: "snapshot",
            },
            {
              col: "Articles_inv_norm",
              label: "Wikipedia articles",
              rawCol: "Articles",
              formula: "1 − (x−min)/(max−min)",
              source: "Wikimedia Meta",
              url: "https://meta.wikimedia.org/wiki/List_of_Wikipedias",
              freq: "snapshot",
            },
            {
              col: "active_users_inv_norm",
              label: "Wikipedia active editors",
              rawCol: "active_users",
              formula: "1 − (x−min)/(max−min)",
              source: "Wikimedia Meta",
              url: "https://meta.wikimedia.org/wiki/List_of_Wikipedias",
              freq: "snapshot",
            },
            {
              col: "Datasets_inv_norm",
              label: "HuggingFace datasets",
              rawCol: "Datasets",
              formula: "1 − (x−min)/(max−min)",
              source: "Hugging Face Hub",
              url: "https://huggingface.co/datasets",
              freq: "snapshot",
            },
            {
              col: "Models_inv_norm",
              label: "HuggingFace models",
              rawCol: "Models",
              formula: "1 − (x−min)/(max−min)",
              source: "Hugging Face Hub",
              url: "https://huggingface.co/models",
              freq: "snapshot",
            },
            {
              col: "appear_google_inv_norm",
              label: "Google Translate support",
              rawCol: "appear_google",
              formula: "1 − x  (binary)",
              source: "Google Cloud Translate",
              url: "https://cloud.google.com/translate/docs/languages",
              freq: "as added",
            },
          ],
        },
        {
          key: "soceco",
          label: "Social & Econ",
          fullLabel: "Social & Economic",
          normCol: "Social_and_Economic_Indicators_norm",
          level: "country",
          color: "#f39c12",
          defaultWeight: 15,
          subCols: [
            {
              col: "GDP_2015_inv_norm",
              label: "GDP per capita (2015 USD)",
              rawCol: "GDP_2015",
              formula: "1 − (x−min)/(max−min)",
              source: "World Bank",
              url: "https://data.worldbank.org/indicator/NY.GDP.PCAP.CD",
              freq: "annual (2015 vintage)",
            },
            {
              col: "IHDI_inv_norm",
              label: "Inequality-adj. HDI",
              rawCol: "IHDI",
              formula: "1 − x",
              source: "UNDP / Our World in Data",
              url: "https://ourworldindata.org/human-development-index",
              freq: "annual (most recent)",
            },
            {
              col: "Education_Index_Value_inv_norm",
              label: "Education Index",
              rawCol: "Education_Index_Value",
              formula: "1 − x",
              source: "UNDP HDR",
              url: "https://hdr.undp.org/data-center/documentation-and-downloads",
              freq: "annual",
            },
            {
              col: "Literacy_Rate_inv_norm",
              label: "Literacy rate",
              rawCol: "Literacy_Rate",
              formula: "1 − (x / 100)",
              source: "UNESCO / Our World in Data",
              url: "https://ourworldindata.org/literacy",
              freq: "annual (most recent)",
            },
          ],
        },
      ];

      // ── Column display metadata (label + default width) ─────────────────────

      const COL_META = {
        Region:          { label: "",               width: 0   },
        language_name:   { label: "Language",      width: 170 },
        location_name:   { label: "Country",       width: 130 },
        weighted_index:  { label: "Score", width: 120, color: "#2c3e50" },

        // Pillar columns — each pillar's color applied to its bar
        Linguistic_Indicators_norm:                        { label: "Linguistic",    width: 120, color: "#3498db" },
        Crisis_Risk_Indicators_norm:                       { label: "Crisis Risk",   width: 120, color: "#e74c3c" },
        Communications_and_Technology_Indicators_norm:     { label: "Comms & Tech",  width: 120, color: "#9b59b6" },
        Language_Technology_Indicators_norm:               { label: "Language Tech", width: 145, color: "#1abc9c" },
        Social_and_Economic_Indicators_norm:               { label: "Social & Econ", width: 120, color: "#f39c12" },

        // Linguistic sub-indicators
        total_speakers_norm:                               { label: "Total Speakers",  width: 115, color: "#3498db" },
        Linguistic_Diversity_Index_2017_norm:              { label: "Diversity Index", width: 115, color: "#3498db" },

        // Crisis Risk sub-indicators
        "INFORM Severity Index_norm":                      { label: "INFORM Severity", width: 120, color: "#e74c3c" },
        Active_Risks_Count_norm:                           { label: "Active Risks",    width: 110, color: "#e74c3c" },
        drivers_count_norm:                                { label: "Driver Types",    width: 110, color: "#e74c3c" },

        // Comms & Tech sub-indicators
        MCI_Index_inv_norm:                                { label: "MCI",             width: 110, color: "#9b59b6" },
        Digital_Language_Support_inv_norm:                 { label: "Digital Lang.",   width: 110, color: "#9b59b6" },
        Language_accessibility_of_top_ranked_apps_inv_norm:{ label: "App Access.",     width: 110, color: "#9b59b6" },
        ICT_Development_Index_inv_norm:                    { label: "ICT Index",       width: 110, color: "#9b59b6" },

        // Language Tech sub-indicators
        "Recorded Hours_inv_norm":                         { label: "Recorded Hrs",    width: 110, color: "#1abc9c" },
        "Validated Hours_inv_norm":                        { label: "Validated Hrs",   width: 110, color: "#1abc9c" },
        Articles_inv_norm:                                 { label: "WP Articles",     width: 110, color: "#1abc9c" },
        active_users_inv_norm:                             { label: "WP Editors",      width: 110, color: "#1abc9c" },
        Datasets_inv_norm:                                 { label: "HF Datasets",     width: 110, color: "#1abc9c" },
        Models_inv_norm:                                   { label: "HF Models",       width: 110, color: "#1abc9c" },
        appear_google_inv_norm:                            { label: "Google Translate", width: 120, color: "#1abc9c" },

        // Social & Econ sub-indicators
        GDP_2015_inv_norm:                                 { label: "GDP (2015)",      width: 110, color: "#f39c12" },
        IHDI_inv_norm:                                     { label: "IHDI",            width: 110, color: "#f39c12" },
        Education_Index_Value_inv_norm:                    { label: "Education Idx",   width: 110, color: "#f39c12" },
        Literacy_Rate_inv_norm:                            { label: "Literacy Rate",   width: 110, color: "#f39c12" },
      };

      // ── Responsive scale ─────────────────────────────────────────────────────

      function scale() {
        // 1.0 at 1400px, grows to 1.5 at 2100px, shrinks to 0.85 below 1200px
        return Math.max(0.85, Math.min(1.5, window.innerWidth / 1400));
      }

      function px(base) {
        return Math.round(base * scale());
      }

      // ── State ────────────────────────────────────────────────────────────────

      let allRecords = null;
      let allDescs = null;
      let currentMode = "overview";
      let currentProvider = null;

      // Weights — integers 0-100, always sum to 100
      const currentWeights = Object.fromEntries(
        PILLARS.map((p) => [p.key, p.defaultWeight])
      );

      // ── Weight bar ───────────────────────────────────────────────────────────

      function recomputeWeightedIndex() {
        if (!allRecords) return;
        const total = Object.values(currentWeights).reduce((a, b) => a + b, 0);
        if (total <= 0) return;
        allRecords.forEach((rec) => {
          rec.weighted_index = PILLARS.reduce((sum, p) => {
            return sum + (rec[p.normCol] ?? 0) * currentWeights[p.key] / total;
          }, 0);
        });
      }

      function applyWeightChange(changedKey, newVal) {
        newVal = Math.max(0, Math.min(100, newVal));
        const others = PILLARS.filter((p) => p.key !== changedKey);
        const otherSum = others.reduce((s, p) => s + currentWeights[p.key], 0);
        const remaining = 100 - newVal;

        if (otherSum > 0) {
          let distributed = 0;
          others.forEach((p, i) => {
            if (i < others.length - 1) {
              const v = Math.round(currentWeights[p.key] * remaining / otherSum);
              currentWeights[p.key] = v;
              distributed += v;
            } else {
              currentWeights[p.key] = remaining - distributed;
            }
          });
        } else {
          // All others are 0 — split remaining equally
          const share = Math.floor(remaining / others.length);
          others.forEach((p, i) => {
            currentWeights[p.key] = share + (i < remaining % others.length ? 1 : 0);
          });
        }
        currentWeights[changedKey] = newVal;

        // Ensure none went negative (rounding edge cases)
        PILLARS.forEach((p) => {
          currentWeights[p.key] = Math.max(0, currentWeights[p.key]);
        });

        syncWeightUI();
        recomputeWeightedIndex();
        if (allRecords) setMode(currentMode);
      }

      function syncWeightUI() {
        PILLARS.forEach((p) => {
          const slider = document.querySelector(`.w-slider[data-key="${p.key}"]`);
          const label  = document.querySelector(`.w-val[data-key="${p.key}"]`);
          if (slider) slider.value = currentWeights[p.key];
          if (label)  label.textContent = `${currentWeights[p.key]}%`;
        });
        const total = Object.values(currentWeights).reduce((a, b) => a + b, 0);
        const el = document.getElementById("w-total");
        if (el) {
          el.textContent = `= ${total}%`;
          el.className = `w-total ${total === 100 ? "ok" : "warn"}`;
        }
      }

      function buildWeightBar() {
        const bar = document.getElementById("weight-bar");
        const totalEl = document.getElementById("w-total");
        PILLARS.forEach((p) => {
          const group = document.createElement("div");
          group.className = "weight-group";

          const dot = document.createElement("span");
          dot.className = "w-dot";
          dot.style.background = p.color;

          const name = document.createElement("span");
          name.className = "w-name";
          name.textContent = p.label;

          const slider = document.createElement("input");
          slider.type = "range";
          slider.className = "w-slider";
          slider.dataset.key = p.key;
          slider.min = 0;
          slider.max = 100;
          slider.step = 1;
          slider.value = p.defaultWeight;
          slider.style.setProperty("--pillar-color", p.color);
          slider.addEventListener("input", (e) => {
            applyWeightChange(p.key, Number(e.target.value));
          });

          const val = document.createElement("span");
          val.className = "w-val";
          val.dataset.key = p.key;
          val.textContent = `${p.defaultWeight}%`;

          group.append(dot, name, slider, val);
          bar.insertBefore(group, totalEl);
        });
        syncWeightUI();

        document.getElementById("btn-reset-weights").addEventListener("click", () => {
          PILLARS.forEach((p) => { currentWeights[p.key] = p.defaultWeight; });
          syncWeightUI();
          recomputeWeightedIndex();
          if (allRecords) setMode(currentMode);
        });
      }

      // ── CSV parser (unchanged from v0.1) ─────────────────────────────────────

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let value = "";
        let quoted = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];

          if (quoted) {
            if (char === '"' && next === '"') {
              value += '"';
              index += 1;
            } else if (char === '"') {
              quoted = false;
            } else {
              value += char;
            }
          } else if (char === '"') {
            quoted = true;
          } else if (char === ",") {
            row.push(value);
            value = "";
          } else if (char === "\n") {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          } else if (char !== "\r") {
            value += char;
          }
        }

        if (value.length > 0 || row.length > 0) {
          row.push(value);
          rows.push(row);
        }

        const headers = rows.shift();
        return rows
          .filter((cells) => cells.some((cell) => cell !== ""))
          .map((cells) =>
            headers.reduce((record, header, index) => {
              record[header] = cells[index] ?? "";
              return record;
            }, {})
          );
      }

      function isNumberValue(value) {
        if (value === "" || value === "NA" || value === "NaN") return true;
        return Number.isFinite(Number(value));
      }

      function prepareColumns(records) {
        const columns = Object.keys(records[0]);
        const converted = records.map((record) => ({ ...record }));
        const descriptions = columns.map((column) => {
          const values = records.map((record) => record[column]);
          const numeric = values.every(isNumberValue);

          if (numeric) {
            const numbers = values
              .filter((v) => v !== "" && v !== "NA" && v !== "NaN")
              .map(Number);
            const min = Math.min(...numbers);
            const max = Math.max(...numbers);
            converted.forEach((record) => {
              const v = record[column];
              record[column] =
                v === "" || v === "NA" || v === "NaN" ? null : Number(v);
            });
            return { column, type: "number", domain: [min, max] };
          }

          const categories = Array.from(new Set(values.filter(Boolean))).sort();
          if (categories.length > 1 && categories.length <= 40) {
            return { column, type: "categorical", categories };
          }

          return { column, type: "string" };
        });

        return { converted, descriptions };
      }

      // ── LineUp management ────────────────────────────────────────────────────
      // Contribution columns (*_contrib) are precomputed by build_index.py and
      // present in the CSV.  Drill-down mode uses them directly so the sub-indicator
      // bars sum exactly to the pillar score shown in the overview.
      // See CrisisVoices/index/build_index.py for the formula.

      function getColsForMode(mode) {
        if (mode === "overview") {
          return [
            ...CONTEXT_COLS,
            WEIGHTED_COL,
            ...PILLARS.map((p) => p.normCol),
          ];
        }
        const pillar = PILLARS.find((p) => p.key === mode);
        if (!pillar) return getColsForMode("overview");
        return [
          ...CONTEXT_COLS,
          WEIGHTED_COL,
          pillar.normCol,
          ...pillar.subCols.map((s) => `${s.col}_contrib`),
        ];
      }

      function buildLineUp(mode) {
        const colKeys = getColsForMode(mode);

        // Region drives groupBy — kept in ranking but width-0 so it's not a visible column
        const descKeys = colKeys.includes("Region")
          ? colKeys
          : ["Region", ...colKeys];

        const orderedDescs = descKeys
          .map((key) => {
            const base = allDescs.find((d) => d.column === key);
            if (!base) return null;
            // _contrib cols (from data) inherit label/width/color from underlying _norm col
            const metaKey = key.endsWith("_contrib")
              ? key.slice(0, -8)
              : key;
            const meta = COL_META[metaKey] || {};
            return {
              ...base,
              ...(meta.label && { label: meta.label }),
              ...(meta.width && { width: px(meta.width) }),
              ...(meta.color && { color: meta.color }),
            };
          })
          .filter(Boolean);

        const container = document.querySelector("#lineup");
        container.innerHTML = "";

        const provider = new LineUpJS.LocalDataProvider(
          allRecords,
          orderedDescs
        );
        provider.deriveDefault();
        currentProvider = provider;

        const ranking = provider.getLastRanking();
        const byCol = (key) =>
          ranking.find((c) => c.desc && c.desc.column === key);

        const wCol = byCol(WEIGHTED_COL);
        if (wCol) ranking.sortBy(wCol, false);

        const regionCol = byCol("Region");
        if (regionCol) ranking.groupBy(regionCol);

        const lineup = new LineUpJS.Taggle(container, provider, {
          rowHeight: px(24),
          groupHeight: px(48),
        });
        lineup.update();

        // Row selection → side panel
        provider.on("selectionChanged", (indices) => {
          if (indices && indices.length > 0) {
            const rec = allRecords[indices[0]];
            if (rec) showSidePanel(rec);
          } else {
            hideSidePanel();
          }
        });
      }

      // ── Mode switching ───────────────────────────────────────────────────────

      function setMode(mode) {
        currentMode = mode;
        hideSidePanel();
        buildLineUp(mode);

        const overviewBtn = document.querySelector("#btn-overview");
        overviewBtn.classList.toggle("active", mode === "overview");

        document.querySelectorAll(".pillar-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.pillar === mode);
        });
      }

      // ── Side panel ───────────────────────────────────────────────────────────

      function showSidePanel(record) {
        const panel = document.querySelector("#side-panel");
        document.querySelector("#panel-inner").innerHTML =
          buildPanelHTML(record);
        panel.classList.add("open");
      }

      function hideSidePanel() {
        document.querySelector("#side-panel").classList.remove("open");
      }

      function fmt(val, dec = 3) {
        if (
          val === null ||
          val === undefined ||
          val === "" ||
          (typeof val === "number" && isNaN(val))
        )
          return null;
        if (typeof val === "number") return val.toFixed(dec);
        return String(val);
      }

      function buildPanelHTML(record) {
        const score = fmt(record[WEIGHTED_COL]) ?? "—";

        const pillarSections = PILLARS.map((pillar) => {
          const pillarScore = fmt(record[pillar.normCol]) ?? "—";
          const levelClass = pillar.level === "country" ? "country" : "language";
          const levelText =
            pillar.level === "country" ? "country-level" : "language-level";

          const subRows = pillar.subCols
            .map((sub) => {
              const rawVal = record[sub.rawCol];
              const normVal = record[sub.col];
              const contribVal = record[`${sub.col}_contrib`];
              const isNull =
                rawVal === null ||
                rawVal === undefined ||
                rawVal === "" ||
                (typeof rawVal === "number" && isNaN(rawVal));

              const rawDisplay = isNull
                ? '<span class="missing">no data</span>'
                : fmt(rawVal, 2) ?? "—";
              const normDisplay = fmt(normVal) ?? "—";
              const contribDisplay =
                contribVal !== undefined ? fmt(contribVal) : "—";

              return `
                <tr class="${isNull ? "null-row" : ""}">
                  <td class="sub-label">${sub.label}</td>
                  <td class="sub-raw">${rawDisplay}</td>
                  <td class="sub-arrow">→</td>
                  <td class="sub-norm">${normDisplay}</td>
                  <td class="sub-arrow">→</td>
                  <td class="sub-contrib" title="contribution to pillar score">${contribDisplay}</td>
                  <td class="sub-meta">
                    <span class="formula">${sub.formula}</span>
                    <a class="source-link" href="${sub.url}" target="_blank" rel="noopener">${sub.source}</a>
                    <span class="freq">${sub.freq}</span>
                  </td>
                </tr>
                ${isNull ? `<tr class="null-note"><td colspan="7">⚠ No source data — filled as 0 before aggregation</td></tr>` : ""}
              `;
            })
            .join("");

          return `
            <div class="pillar-section">
              <div class="pillar-head">
                <span class="pillar-dot" style="background:${pillar.color}"></span>
                <span class="pillar-name">${pillar.fullLabel}</span>
                <span class="level-badge ${levelClass}">${levelText}</span>
                <span class="pillar-score">${pillarScore}</span>
              </div>
              <table class="sub-table">
                <thead>
                  <tr class="sub-header-row">
                    <th></th>
                    <th class="sub-raw">raw</th>
                    <th></th>
                    <th class="sub-norm">norm</th>
                    <th></th>
                    <th class="sub-contrib">contrib</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>${subRows}</tbody>
              </table>
            </div>
          `;
        }).join("");

        return `
          <div class="panel-top">
            <button class="close-btn" onclick="hideSidePanel()" title="Close">×</button>
            <span class="panel-lang">${record.language_name ?? "—"}</span>
            <span class="panel-country">${record.location_name ?? "—"}</span>
            <div class="panel-meta">
              ${record.Region ?? ""} · <em>${record.status ?? ""}</em>
            </div>
            <div class="panel-score-row">
              <span>Composite score
                <span style="color:var(--muted);font-size:11px;font-weight:400">
                  (${PILLARS.map(p => `${p.label.split(' ')[0]} ${currentWeights[p.key]}%`).join(' · ')})
                </span>
              </span>
              <strong>${score}</strong>
            </div>
          </div>
          ${pillarSections}
        `;
      }

      // ── Init ─────────────────────────────────────────────────────────────────

      // Build weight bar
      buildWeightBar();

      // Inject pillar drill-down buttons
      const modeBar = document.querySelector("#mode-bar");
      PILLARS.forEach((p) => {
        const btn = document.createElement("button");
        btn.className = "pillar-btn";
        btn.dataset.pillar = p.key;
        btn.textContent = p.label;
        btn.title = p.fullLabel;
        btn.style.setProperty("--pillar-color", p.color);
        btn.addEventListener("click", () => setMode(p.key));
        modeBar.appendChild(btn);
      });

      document
        .querySelector("#btn-overview")
        .addEventListener("click", () => setMode("overview"));

      // Rebuild on resize so scale() is re-evaluated
      let resizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          if (allRecords) setMode(currentMode);
        }, 250);
      });

      // Load data
      (window.__BAKED_CSV__
        ? Promise.resolve(window.__BAKED_CSV__)
        : fetch("/data/Final_Index.csv").then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.text();
          })
      )
        .then((text) => {
          const records = parseCsv(text);
          const { converted, descriptions } = prepareColumns(records);
          allRecords = converted;
          allDescs = descriptions;
          recomputeWeightedIndex();
          setMode("overview");
          document.querySelector("#status").textContent = `${records.length.toLocaleString()} rows`;
        })
        .catch((error) => {
          const status = document.querySelector("#status");
          status.className = "error";
          status.textContent = `Could not load data: ${error.message}`;
        });
    </script>
  </body>
</html>
